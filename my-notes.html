        <!-- Add New Note -->

            <h3 class="note-title">Add new Note</h3>

            <!-- الفورم (هذا المهم) -->
            <form action="my-notes.html">

                <!-- priority -->
                <select class="priority-select">
                    <option disabled selected>Priority</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>

                <!-- textarea -->
                <textarea class="note-text" placeholder="Text Area"></textarea>

                <!-- زر الحفظ -->
                <button type="submit" class="note-btn">Save</button>

            </form>

        </div>
