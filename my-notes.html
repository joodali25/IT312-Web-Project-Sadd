    <main class="container">

 <!-- Main Content Section -->
    <div class="container">
        <h2>My Notes</h2>

        <!-- My Saved Notes Section -->
        <section class="saved-notes">
            <h3>My saved notes</h3>
            <form action="#" method="POST">
                <!-- Example of saved notes with checkboxes -->
                <div class="note-item">
                    <input type="checkbox" id="note1" name="note1">
                    <label for="note1">
                        <img src="note1.png" alt="Note 1 Image" class="note-image" width="100" height="100"> <!-- Image of the note -->
                        write the lecture notes
                    </label>
                </div>

                <div class="note-item">
                    <input type="checkbox" id="note2" name="note2">
                    <label for="note2">
                        <img src="note1.png" alt="Note 2 Image" class="note-image" width="100" height="100"> <!-- Image of the note -->
                        do my homework
                    </label>
                </div>

                <!-- Delete button for selected notes -->
                <button type="submit" name="delete" class="delete-btn">Delete Selected</button>
            </form>
        </section>

        <!-- Add New Note Section -->
        <section class="add-note">
            <h3>Add New Note</h3>
            <form action="#" method="POST">
                <!-- Textarea to write the new note -->
                <textarea name="note-text" rows="4" placeholder="Enter your note text here..."></textarea>

                <!-- Dropdown list to select priority -->
                <label for="priority">Priority:</label>
                <select name="priority" id="priority">
                    <option value="1">1 (Low)</option>
                    <option value="2">2 (Medium)</option>
                    <option value="3">3 (High)</option>
                </select>

                <!-- Add button for submitting the new note -->
                <button type="submit" name="add" class="add-btn">Add Note</button>
            </form>
        </section>

        <!-- Save button (functionality will be implemented later with JavaScript) -->
        <section class="save-section">
            <button type="button" class="save-btn">Save</button>
        </section>
    </div>
