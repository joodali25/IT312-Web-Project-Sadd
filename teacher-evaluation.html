    <main class="container">

  <!-- Main Content Section -->
    <div class="container">
        <h2>Teachers Evaluation</h2>

        <!-- Teacher Evaluation Form -->
        <section class="teacher-evaluation-form">
            <form action="#" method="POST">
                <!-- Teacher Selection Dropdown -->
                <label for="teacher-name">Teacher name:</label>
                <select name="teacher-name" id="teacher-name">
                    <option value="dalia">Dalia</option>
                    <option value="joad">Joad</option>
                    <option value="lama">Lama</option>
                    <option value="aryam">Aryam</option>
                </select>

                <!-- Rating Section (Star Rating) -->
                <label for="rating">Rating:</label>
                <div id="rating">
                    <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                    <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                    <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                    <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                    <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
                </div>

                <!-- Feedback Section -->
                <label for="feedback">Feedback:</label>
                <textarea name="feedback" id="feedback" rows="5" placeholder="Enter your feedback here..."></textarea>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </section>
    </div>
